<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Local Video Player</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#000000">

<style>

body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,sans-serif;
}

header{
  padding:16px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  background:#111;
}

.container{
  padding:12px;
}

video{
  width:100%;
  border-radius:16px;
  background:#000;
  margin-bottom:16px;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

button,label{
  background:#222;
  color:white;
  border:none;
  border-radius:12px;
  padding:12px 16px;
  font-size:16px;
}

input[type=file]{
  display:none;
}

.playlist{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.item{
  background:#1a1a1a;
  padding:12px;
  border-radius:12px;
}

.active{
  background:#007aff;
}

</style>
</head>

<body>

<header>
Local Video Player
</header>

<div class="container">

<video
id="player"
controls
playsinline
webkit-playsinline
></video>

<div class="controls">

<label>
動画を選択
<input type="file" id="videos" multiple accept="video/*">
</label>

<button id="shuffleBtn">
シャッフル OFF
</button>

<button id="loopBtn">
ループ OFF
</button>

</div>

<div class="playlist" id="playlist"></div>

</div>

<script>

const player = document.getElementById('player');
const input = document.getElementById('videos');
const playlistEl = document.getElementById('playlist');

const shuffleBtn = document.getElementById('shuffleBtn');
const loopBtn = document.getElementById('loopBtn');

let playlist = [];
let currentIndex = 0;

let shuffle = false;
let loop = false;

input.addEventListener('change', (e) => {

  playlist = [...e.target.files];

  if(playlist.length === 0) return;

  currentIndex = 0;

  renderPlaylist();

  playVideo(currentIndex);

});

function playVideo(index){

  const file = playlist[index];

  if(!file) return;

  const url = URL.createObjectURL(file);

  player.src = url;

  player.play();

  renderPlaylist();

}

player.addEventListener('ended', () => {

  if(shuffle){

    currentIndex = Math.floor(
      Math.random() * playlist.length
    );

    playVideo(currentIndex);

    return;
  }

  currentIndex++;

  if(currentIndex < playlist.length){

    playVideo(currentIndex);

  }else if(loop){

    currentIndex = 0;

    playVideo(currentIndex);

  }

});

function renderPlaylist(){

  playlistEl.innerHTML = '';

  playlist.forEach((file, index) => {

    const item = document.createElement('div');

    item.className = 'item';

    if(index === currentIndex){
      item.classList.add('active');
    }

    item.textContent = file.name;

    item.onclick = () => {

      currentIndex = index;

      playVideo(currentIndex);

    };

    playlistEl.appendChild(item);

  });

}

shuffleBtn.addEventListener('click', () => {

  shuffle = !shuffle;

  shuffleBtn.textContent =
    shuffle
    ? 'シャッフル ON'
    : 'シャッフル OFF';

});

loopBtn.addEventListener('click', () => {

  loop = !loop;

  loopBtn.textContent =
    loop
    ? 'ループ ON'
    : 'ループ OFF';

});

if('serviceWorker' in navigator){

  navigator.serviceWorker.register('./sw.js');

}

</script>

</body>
</html>
